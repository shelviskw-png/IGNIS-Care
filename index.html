<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IGNIS Care</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #F7FBFF, #EAF3FF);
    color: #1F2D3D;
}

header {
    padding: 18px;
    font-size: 22px;
    font-weight: 600;
    background: linear-gradient(135deg, #2F80ED, #56CCF2);
    color: white;
}

.container {
    padding: 15px;
    margin-bottom: 90px;
}

.card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding: 16px;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(47,128,237,0.15);
}

#chatBox {
    height: 280px;
    overflow-y: auto;
    padding: 10px;
}

.chat-row {
    display: flex;
    margin: 8px 0;
}

.chat-user { justify-content: flex-end; }
.chat-bot { justify-content: flex-start; }

.bubble {
    padding: 12px;
    border-radius: 16px;
    max-width: 75%;
}

.user-bubble {
    background: #2F80ED;
    color: white;
}

.bot-bubble {
    background: #EAF3FF;
}

.input-area {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #D6E4FF;
}

button {
    background: #2F80ED;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 14px;
}

.mood-btn {
    font-size: 22px;
    background: #EAF3FF;
    color: #2F80ED;
}

.progress {
    height: 10px;
    background: #EAF3FF;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #2F80ED;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav-item {
    text-align: center;
    color: #2F80ED;
}

.page { display: none; }
.page.active { display: block; }
</style>
</head>

<body>

<header>💙 IGNIS Care</header>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3>Kesehatan Mental Kamu</h3>
<p>Tempat aman untuk berbagi dan mendapatkan dukungan.</p>
</div>

<div class="card">
<h4>Tingkat Stres</h4>
<div class="progress">
<div id="stressBar" class="progress-bar"></div>
</div>
<p id="stressText">Belum ada data</p>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<div id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="Tulis perasaanmu...">
<button onclick="sendMessage()">➤</button>
</div>

</div>
</div>

<!-- MOOD -->
<div id="mood" class="page">
<div class="card">
<h3>Mood Hari Ini</h3>
<button class="mood-btn">😊</button>
<button class="mood-btn">😐</button>
<button class="mood-btn">😔</button>
<button class="mood-btn">😡</button>
</div>
</div>

<!-- BK -->
<div id="bk" class="page">
<div class="card">
<h3>Bantuan</h3>
<button onclick="contactBK()">Hubungi BK</button>
</div>
</div>

</div>

<div class="nav">
<div class="nav-item" onclick="showPage('home')">🏠</div>
<div class="nav-item" onclick="showPage('chat')">💬</div>
<div class="nav-item" onclick="showPage('mood')">😊</div>
<div class="nav-item" onclick="showPage('bk')">🧑‍🏫</div>
</div>

<script>

function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

async function sendMessage() {
    let input = document.getElementById("userInput").value;
    let chatBox = document.getElementById("chatBox");

    if(!input.trim()) return;

    chatBox.innerHTML += `<div class="chat-row chat-user">
    <div class="bubble user-bubble">${input}</div></div>`;

    document.getElementById("userInput").value = "";

    let res = await fetch("http://localhost:3000/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:input})
    });

    let data = await res.json();

    chatBox.innerHTML += `<div class="chat-row chat-bot">
    <div class="bubble bot-bubble">${data.reply}</div></div>`;

    chatBox.scrollTop = chatBox.scrollHeight;

    analyzeStress(input);
}

async function analyzeStress(msg) {
    let res = await fetch("http://localhost:3000/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    });

    let data = await res.json();

    document.getElementById("stressBar").style.width = data.score + "%";
    document.getElementById("stressText").innerText =
        data.level + " (" + data.score + ")";
}

function contactBK() {
    window.open("https://wa.me/6281234567890");
}

</script>

</body>
</html>
